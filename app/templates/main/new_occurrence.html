{% extends "base.html" %}
{% block title %}Nova Ocorrência{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm">
            <div class="card-header bg-dark text-white">
                <h5 class="mb-0"><i class="bi bi-journal-plus"></i> Iniciar Relatório de Ocorrências</h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Data e Hora de Início do Turno</label>
                        <input type="datetime-local" name="shift_start" class="form-control" 
                               value="{{ now.strftime('%Y-%m-%dT%H:%M') }}" required>
                        <small class="text-muted">Registre o horário de início do seu turno</small>
                    </div>
                    
                    <div class="alert alert-info">
                        <i class="bi bi-info-circle"></i> 
                        Após iniciar, você poderá escrever o relatório das ocorrências com salvamento automático.
                    </div>
                    
                    <div class="d-flex gap-2">
                        <a href="{{ url_for('main.occurrences') }}" class="btn btn-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-play-circle"></i> Iniciar Relatório
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
