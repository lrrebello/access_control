{% extends "base.html" %}
{% block title %}Adicionar Posto{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-header bg-dark text-white">
                <h5 class="mb-0"><i class="bi bi-building-add"></i> Novo Posto de Trabalho</h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Nome do Posto *</label>
                        <input type="text" name="name" class="form-control" required placeholder="Ex: Portaria 1">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Localização</label>
                        <input type="text" name="location" class="form-control" placeholder="Ex: Entrada Principal">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Descrição</label>
                        <textarea name="description" class="form-control" rows="3" placeholder="Descrição do posto..."></textarea>
                    </div>
                    <div class="d-flex gap-2">
                        <a href="{{ url_for('auth.admin_workstations') }}" class="btn btn-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-primary">Salvar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
